<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" routerLink="/">
      <span class="fs-4 fw-bold text-gradient">EduSphere</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0 align-items-center">
        <li class="nav-item">
          <a class="nav-link" routerLink="/courses">Browse Courses</a>
        </li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <!-- Cart Badge -->
        <a routerLink="/cart" class="position-relative p-2 text-light hover-opacity" title="Shopping Cart">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" class="bi bi-cart3" viewBox="0 0 16 16">
            <path d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .49.598l-1 5a.5.5 0 0 1-.465.401l-9.397.472L4.415 11H13a.5.5 0 0 1 0 1H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5M3.102 4l.84 4.479 9.144-.459L13.89 4zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4m7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4m-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2m7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2"/>
          </svg>
          @if (paymentService.cartItems().length > 0) {
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-primary border border-dark">
              {{ paymentService.cartItems().length }}
            </span>
          }
        </a>

        @if (authService.isAuthenticated()) {
          <span class="text-light-muted d-none d-md-inline">Welcome, {{ authService.currentUser()?.firstName }}</span>
          <a [routerLink]="getDashboardLink()" class="btn btn-outline-primary btn-sm">Dashboard</a>
          <button (click)="logout()" class="btn btn-danger btn-sm">Logout</button>
        } @else {
          <a routerLink="/login" class="btn btn-outline-light btn-sm">Login</a>
          <a routerLink="/register" class="btn btn-primary btn-sm">Sign Up</a>
        }
      </div>
    </div>
  </div>
</nav>
