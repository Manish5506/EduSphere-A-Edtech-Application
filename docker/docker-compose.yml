version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: edtech-mysql
    restart: always
    environment:
      MYSQL_DATABASE: edtech_db
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.0-alpine
    container_name: edtech-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: edtech-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:mysql://mysql:3306/edtech_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: ""
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: 9a4f2c8d3b7a1e6f8c5b3a2d1e0f9c8b7a6d5c4b3a2e1d0f9c8b7a6e5d4c3b2a
    depends_on:
      - mysql
      - redis
    volumes:
      - app_uploads:/app/uploads

volumes:
  mysql_data:
  redis_data:
  app_uploads:
